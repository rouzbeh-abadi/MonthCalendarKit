# Runs the MonthCalendarKit XCTest suite on every push to main and on
# every pull request. The package has no private dependencies, so no
# SSH keys or repository secrets are required.

name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel any in-flight run when a newer commit lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: iOS Simulator
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme MonthCalendarKit \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO
